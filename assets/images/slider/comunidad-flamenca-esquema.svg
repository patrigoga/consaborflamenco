<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">Comunidad flamenca conectada</title>
  <desc id="desc">Ilustracion sin texto de una comunidad flamenca conectada alrededor de un nucleo central.</desc>
  <defs>
    <radialGradient id="warmLight" cx="70%" cy="20%" r="78%">
      <stop offset="0" stop-color="#4b1b18" stop-opacity="0.82"/>
      <stop offset="0.42" stop-color="#151313" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#050506"/>
    </radialGradient>
    <linearGradient id="redSweep" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#7d1014" stop-opacity="0.08"/>
      <stop offset="0.48" stop-color="#c71922" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#e7b46a" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" seed="12"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.15"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="960" height="720" fill="url(#warmLight)"/>
  <rect width="960" height="720" filter="url(#grain)" opacity="0.46"/>


<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">Registro en comunidad flamenca</title>
  <desc id="desc">Ilustracion transparente de una tarjeta de perfil flamenco lista para registrarse.</desc>
  <defs>
    <linearGradient id="redRibbon" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#7d1014" stop-opacity="0.08"/>
      <stop offset="0.48" stop-color="#c71922" stop-opacity="0.86"/>
      <stop offset="1" stop-color="#f0c77a" stop-opacity="0.24"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff9f0"/>
      <stop offset="1" stop-color="#dce9ef"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="22" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <path d="M34 618 C184 516 238 586 370 440 C516 278 636 422 810 238 C888 156 944 118 1018 98" fill="none" stroke="url(#redRibbon)" stroke-width="90" stroke-linecap="round" opacity="0.82"/>
  <path d="M54 654 C196 560 286 612 438 470 C578 340 692 414 874 210" fill="none" stroke="#b51218" stroke-width="4" stroke-linecap="round" opacity="0.72"/>

  <g opacity="0.28" stroke="#f8e5b6" stroke-width="2" fill="none">
    <path d="M620 126 C666 76 744 88 784 144"/>
    <path d="M678 158 C648 208 662 270 718 300"/>
    <path d="M732 176 C792 216 826 292 816 368"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="274" y="158" width="412" height="374" rx="30" fill="#0b0f14" stroke="#c94f5c" stroke-width="3"/>
    <rect x="306" y="204" width="348" height="286" rx="22" fill="url(#card)" opacity="0.98"/>

    <circle cx="410" cy="306" r="58" fill="#111114"/>
    <circle cx="410" cy="282" r="22" fill="none" stroke="#f0c77a" stroke-width="7"/>
    <path d="M366 356 C380 318 440 318 454 356" fill="none" stroke="#f0c77a" stroke-width="7" stroke-linecap="round"/>

    <rect x="496" y="254" width="96" height="16" rx="8" fill="#c94f5c"/>
    <rect x="496" y="292" width="126" height="12" rx="6" fill="#172838" opacity="0.55"/>
    <rect x="496" y="324" width="104" height="12" rx="6" fill="#172838" opacity="0.35"/>

    <rect x="352" y="404" width="118" height="22" rx="11" fill="#c94f5c" opacity="0.9"/>
    <rect x="494" y="404" width="108" height="22" rx="11" fill="#c9a45a" opacity="0.92"/>
  </g>

  <g filter="url(#glow)">
    <circle cx="648" cy="190" r="54" fill="#111114" stroke="#f0c77a" stroke-width="3"/>
    <path d="M624 190 L642 208 L678 170" fill="none" stroke="#c94f5c" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g fill="none" stroke="#fff9f0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.72">
    <path d="M172 362 C218 316 274 328 306 386"/>
    <path d="M208 348 C194 390 218 428 262 446"/>
    <path d="M230 316 C258 280 298 266 346 274"/>
    <path d="M708 418 C754 368 812 382 842 440"/>
    <path d="M750 404 C736 446 760 484 804 502"/>

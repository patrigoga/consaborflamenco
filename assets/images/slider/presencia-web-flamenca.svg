<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">Presencia web flamenca</title>
  <desc id="desc">Ilustracion sin texto de perfiles web conectados para artistas y espacios flamencos.</desc>
  <defs>
    <radialGradient id="bg" cx="26%" cy="22%" r="88%">
      <stop offset="0" stop-color="#33212a" stop-opacity="0.92"/>
      <stop offset="0.44" stop-color="#151a20" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#050506"/>
    </radialGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f0e4"/>
      <stop offset="1" stop-color="#d8e6ef"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#5e0e13" stop-opacity="0.1"/>
      <stop offset="0.52" stop-color="#c71922" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#f0c77a" stop-opacity="0.24"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="20" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" seed="22"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.13"/>
      </feComponentTransfer>
    </filter>
  </defs>

